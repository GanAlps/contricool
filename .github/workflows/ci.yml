name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  id-token: write   # for cdk-diff job's OIDC role assumption

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.22.0
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm gitleaks gitleaks.tar.gz
          gitleaks version
      - name: Scan history
        run: gitleaks detect --redact --no-banner --config .gitleaks.toml --exit-code 1

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API + infra dev deps
        run: |
          set -euo pipefail
          pip install --upgrade pip
          pip install -e 'apps/api[dev]'
          pip install -e 'apps/infra[dev]'
      - name: ruff check (apps/api)
        run: ruff check apps/api
      - name: ruff check (apps/infra)
        run: ruff check apps/infra
      - name: mypy (apps/api)
        run: mypy apps/api/app
      - name: mypy (apps/infra)
        # CDK constructs use jsii-generated types that don't satisfy
        # mypy --strict cleanly; we run non-strict here and tighten as we
        # add our own modules.
        run: mypy --no-strict-optional --ignore-missing-imports apps/infra/stacks apps/infra/aspects apps/infra/app.py apps/infra/cdk_constructs

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dev deps
        run: |
          set -euo pipefail
          pip install --upgrade pip
          pip install -e 'apps/api[dev]'
      - name: Run API tests with coverage floor
        working-directory: apps/api
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=99
      - name: Install infra dev deps
        run: pip install -e 'apps/infra[dev]'
      - name: Run infra tests
        working-directory: apps/infra
        run: pytest

  cdk-diff:
    name: cdk-diff
    runs-on: ubuntu-latest
    # cdk-diff needs the PR-readonly OIDC role to look up deployed stack
    # state. On main pushes (post-merge) this job becomes a no-op since the
    # source of truth is what gets deployed by deploy.yml.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install infra deps
        run: pip install -e 'apps/infra[dev]'
      - name: Configure AWS credentials (PR-readonly via OIDC)
        if: vars.AWS_DEPLOY_ROLE_PR_RO != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_PR_RO }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: cdk synth
        if: vars.AWS_DEPLOY_ROLE_PR_RO != ''
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          CONTRICOOL_ALERTS_EMAIL: synth-only@example.invalid
        working-directory: apps/infra
        run: cdk synth
      - name: cdk diff (informational; non-blocking)
        if: vars.AWS_DEPLOY_ROLE_PR_RO != ''
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          CONTRICOOL_ALERTS_EMAIL: synth-only@example.invalid
        working-directory: apps/infra
        run: cdk diff --fail false || true
      - name: Note on first PR (no role yet)
        if: vars.AWS_DEPLOY_ROLE_PR_RO == ''
        run: |
          echo "AWS_DEPLOY_ROLE_PR_RO repo variable not yet set."
          echo "This is expected before the first run of specs/runbooks/first-deploy.md."
          echo "Skipping cdk-diff this run; rerun the job after the runbook."

  openapi-check:
    name: openapi-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: openapi-check placeholder
        run: |
          echo "openapi-check is a no-op until apps/api adds Pydantic models in Phase 2."
