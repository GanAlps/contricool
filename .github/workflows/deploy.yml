name: Deploy

on:
  push:
    branches: [main]

# Two merges queue rather than overlap — CFN cannot run two parallel deploys
# against the same stack. cancel-in-progress: false on purpose.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # OIDC

jobs:
  deploy-dev:
    name: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      cf_domain: ${{ steps.outputs.outputs.cf_domain }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      # The API Lambda image is arm64 but GitHub-hosted runners are x86_64.
      # qemu provides binfmt_misc emulation so ``RUN`` steps inside the
      # arm64 base image can execute. buildx is the modern docker build
      # frontend that respects ``--platform=linux/arm64``.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install infra deps
        run: pip install -e 'apps/infra[dev]'
      # Phase 2e: build the client SDK + Expo web bundle BEFORE
      # `cdk deploy` so WebStack's BucketDeployment has the artefact.
      # Same commands the `client` and `client-sdk` CI jobs run, so
      # CI-vs-deploy bundle drift is impossible.
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build SDK (generates schema types)
        run: pnpm --filter @contricool/client-sdk build
      - name: Build Expo web bundle
        run: pnpm --filter @contricool/client build:web
      - name: Verify bundle exists
        run: test -f apps/client/dist/index.html
      - name: Bundle-size gate
        working-directory: apps/client
        run: node scripts/check-bundle-size.mjs
      - name: Configure AWS credentials (Dev deploy via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
      # Phase 2e: ApiStack reads /contricool/dev/cloudfront-domain via
      # `ssm.StringParameter.value_for_string_parameter`, which is a CFN
      # dynamic reference (`{{resolve:ssm:...}}`) resolved at stack-update
      # time.  On a brand-new env the parameter doesn't exist yet, which
      # causes CloudFormation to fail the stack.  Pre-seed with a
      # placeholder value (idempotent — `--overwrite` is a no-op when
      # the parameter already holds the real domain).
      - name: Pre-seed cloudfront-domain SSM (idempotent placeholder)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          existing="$(aws ssm get-parameter \
            --name /contricool/dev/cloudfront-domain \
            --query 'Parameter.Value' --output text 2>/dev/null || echo '')"
          if [ -z "${existing}" ]; then
            aws ssm put-parameter \
              --name /contricool/dev/cloudfront-domain \
              --value "placeholder.invalid" \
              --type String \
              --overwrite
          fi
      - name: cdk deploy Contricool-Dev-*
        working-directory: apps/infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          CONTRICOOL_ALERTS_EMAIL: ${{ vars.CONTRICOOL_ALERTS_EMAIL }}
          CONTRICOOL_APP_VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          cdk deploy 'Contricool-Dev-*' \
            --require-approval never \
            --rollback true \
            --concurrency 3
      - name: Capture deploy outputs
        id: outputs
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          cf_domain="$(aws cloudformation describe-stacks \
            --stack-name Contricool-Dev-Web \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionDomainName`].OutputValue' \
            --output text)"
          if [ -z "${cf_domain}" ] || [ "${cf_domain}" = "None" ]; then
            echo "::error::DistributionDomainName output missing from Contricool-Dev-Web"
            exit 1
          fi
          echo "cf_domain=${cf_domain}" >> "${GITHUB_OUTPUT}"
      - name: Write dev CloudFront domain to SSM (idempotent)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name /contricool/dev/cloudfront-domain \
            --value "${{ steps.outputs.outputs.cf_domain }}" \
            --type String \
            --overwrite
      - name: Write dev Cognito + DDB IDs to SSM (idempotent)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        # IDs flow:  CFN stack output → SSM Parameter → API Lambda cold start.
        # NB: the PII salt is owned by the AuthStack custom resource; this
        # step deliberately does NOT touch /contricool/dev/pii-salt.
        run: |
          set -euo pipefail
          fetch_output() {
            local stack="$1"
            local key="$2"
            aws cloudformation describe-stacks \
              --stack-name "${stack}" \
              --query "Stacks[0].Outputs[?OutputKey==\`${key}\`].OutputValue" \
              --output text
          }
          put_string() {
            local name="$1"
            local value="$2"
            if [ -z "${value}" ] || [ "${value}" = "None" ]; then
              echo "::error::Empty SSM value for ${name}"
              exit 1
            fi
            aws ssm put-parameter \
              --name "${name}" \
              --value "${value}" \
              --type String \
              --overwrite
          }
          user_pool_id="$(fetch_output Contricool-Dev-Auth UserPoolId)"
          web_client_id="$(fetch_output Contricool-Dev-Auth WebClientId)"
          ios_client_id="$(fetch_output Contricool-Dev-Auth IosClientId)"
          android_client_id="$(fetch_output Contricool-Dev-Auth AndroidClientId)"
          users_table_name="$(fetch_output Contricool-Dev-Data UsersTableName)"
          transactions_table_name="$(fetch_output Contricool-Dev-Data TransactionsTableName)"
          put_string /contricool/dev/cognito/user-pool-id "${user_pool_id}"
          put_string /contricool/dev/cognito/client-id-web "${web_client_id}"
          put_string /contricool/dev/cognito/client-id-ios "${ios_client_id}"
          put_string /contricool/dev/cognito/client-id-android "${android_client_id}"
          put_string /contricool/dev/ddb/users-table-name "${users_table_name}"
          put_string /contricool/dev/ddb/transactions-table-name "${transactions_table_name}"

  smoke-dev:
    name: smoke-dev
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: dev
    steps:
      - name: Curl /v1/health (retry 10x)
        env:
          CF_DOMAIN: ${{ needs.deploy-dev.outputs.cf_domain }}
          EXPECTED_ENV: dev
        run: |
          set -euo pipefail
          attempt=0
          max_attempts=10
          backoff=10
          while [ "${attempt}" -lt "${max_attempts}" ]; do
            http_code="$(curl -fsS -o /tmp/body.json -w '%{http_code}' \
              "https://${CF_DOMAIN}/v1/health" || echo "000")"
            if [ "${http_code}" = "200" ] && \
               jq -e --arg env "${EXPECTED_ENV}" \
                 '.status == "ok" and .env == $env and (.version | length > 0)' \
                 /tmp/body.json >/dev/null 2>&1; then
              echo "Smoke passed on attempt $((attempt + 1))"
              cat /tmp/body.json
              exit 0
            fi
            echo "Attempt $((attempt + 1))/${max_attempts}: status=${http_code}"
            cat /tmp/body.json 2>/dev/null || echo "<empty body>"
            attempt=$((attempt + 1))
            sleep "${backoff}"
          done
          echo "::error::Smoke failed after ${max_attempts} attempts"
          exit 1
      - name: Curl SPA shell at / (Phase 2e — proves bundle deployed)
        env:
          CF_DOMAIN: ${{ needs.deploy-dev.outputs.cf_domain }}
        run: |
          set -euo pipefail
          attempt=0
          max_attempts=6
          backoff=10
          while [ "${attempt}" -lt "${max_attempts}" ]; do
            body="$(curl -fsS "https://${CF_DOMAIN}/" || echo '')"
            if echo "${body}" | grep -q '<script'; then
              echo "SPA shell served from /"
              exit 0
            fi
            echo "Attempt $((attempt + 1))/${max_attempts}: no <script> tag yet"
            attempt=$((attempt + 1))
            sleep "${backoff}"
          done
          echo "::error::SPA shell missing — Phase-1 placeholder still served?"
          exit 1

  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-latest
    needs: smoke-dev
    environment: prod   # gated on the required-reviewer rule from Phase 0
    outputs:
      cf_domain: ${{ steps.outputs.outputs.cf_domain }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      # arm64 cross-build emulation; same rationale as deploy-dev. CDK
      # asset hash is content-addressed, so prod's image is reused from
      # ECR without a second build — but buildx still needs to be
      # available on the runner for the publish-asset path.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install infra deps
        run: pip install -e 'apps/infra[dev]'
      # Phase 2e — same SDK + bundle pre-build as deploy-dev.
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build SDK (generates schema types)
        run: pnpm --filter @contricool/client-sdk build
      - name: Build Expo web bundle
        run: pnpm --filter @contricool/client build:web
      - name: Verify bundle exists
        run: test -f apps/client/dist/index.html
      - name: Bundle-size gate
        working-directory: apps/client
        run: node scripts/check-bundle-size.mjs
      - name: Configure AWS credentials (Prod deploy via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_PROD }}
          aws-region: ${{ vars.AWS_REGION }}
      # Phase 2e — same first-deploy SSM pre-seed as deploy-dev. See
      # the dev step above for rationale.
      - name: Pre-seed cloudfront-domain SSM (idempotent placeholder)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          existing="$(aws ssm get-parameter \
            --name /contricool/prod/cloudfront-domain \
            --query 'Parameter.Value' --output text 2>/dev/null || echo '')"
          if [ -z "${existing}" ]; then
            aws ssm put-parameter \
              --name /contricool/prod/cloudfront-domain \
              --value "placeholder.invalid" \
              --type String \
              --overwrite
          fi
      - name: cdk deploy Contricool-Prod-*
        working-directory: apps/infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          CONTRICOOL_ALERTS_EMAIL: ${{ vars.CONTRICOOL_ALERTS_EMAIL }}
          CONTRICOOL_APP_VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          cdk deploy 'Contricool-Prod-*' \
            --require-approval never \
            --rollback true \
            --concurrency 3
      - name: Capture deploy outputs
        id: outputs
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          cf_domain="$(aws cloudformation describe-stacks \
            --stack-name Contricool-Prod-Web \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionDomainName`].OutputValue' \
            --output text)"
          if [ -z "${cf_domain}" ] || [ "${cf_domain}" = "None" ]; then
            echo "::error::DistributionDomainName output missing from Contricool-Prod-Web"
            exit 1
          fi
          echo "cf_domain=${cf_domain}" >> "${GITHUB_OUTPUT}"
      # NB: an explicit dev/prod CodeSha256 image-match check used to
      # live here. Removed because:
      #   1. The actual contract is enforced by CDK's content-addressed
      #      DockerImageAsset hashing — same source tree = same digest =
      #      same byte-identical image reused from ECR. CDK guarantees
      #      this without a runtime check.
      #   2. Cross-job ``needs.<job>.outputs.<key>`` propagation showed
      #      flakiness in run 25080974704: dev's ``code_sha`` was
      #      captured non-empty (the step's empty-guard didn't fire) but
      #      came through empty in the consuming job. Suspected GitHub
      #      Actions auto-masking on hex strings; not worth diagnosing
      #      further when the underlying contract is already CDK's.
      # If the image-match guarantee is ever weakened, restore a verify
      # step that reads dev's CodeSha256 from SSM (write it during
      # deploy-dev with ``ssm:PutParameter``) so prod can re-fetch it
      # under its own role without needing ``lambda:GetFunction`` on the
      # dev function.
      - name: Write prod CloudFront domain to SSM (idempotent)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name /contricool/prod/cloudfront-domain \
            --value "${{ steps.outputs.outputs.cf_domain }}" \
            --type String \
            --overwrite
      - name: Write prod Cognito + DDB IDs to SSM (idempotent)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        # See deploy-dev counterpart for rationale. Salt is owned by the
        # AuthStack custom resource and is never written here.
        run: |
          set -euo pipefail
          fetch_output() {
            local stack="$1"
            local key="$2"
            aws cloudformation describe-stacks \
              --stack-name "${stack}" \
              --query "Stacks[0].Outputs[?OutputKey==\`${key}\`].OutputValue" \
              --output text
          }
          put_string() {
            local name="$1"
            local value="$2"
            if [ -z "${value}" ] || [ "${value}" = "None" ]; then
              echo "::error::Empty SSM value for ${name}"
              exit 1
            fi
            aws ssm put-parameter \
              --name "${name}" \
              --value "${value}" \
              --type String \
              --overwrite
          }
          user_pool_id="$(fetch_output Contricool-Prod-Auth UserPoolId)"
          web_client_id="$(fetch_output Contricool-Prod-Auth WebClientId)"
          ios_client_id="$(fetch_output Contricool-Prod-Auth IosClientId)"
          android_client_id="$(fetch_output Contricool-Prod-Auth AndroidClientId)"
          users_table_name="$(fetch_output Contricool-Prod-Data UsersTableName)"
          transactions_table_name="$(fetch_output Contricool-Prod-Data TransactionsTableName)"
          put_string /contricool/prod/cognito/user-pool-id "${user_pool_id}"
          put_string /contricool/prod/cognito/client-id-web "${web_client_id}"
          put_string /contricool/prod/cognito/client-id-ios "${ios_client_id}"
          put_string /contricool/prod/cognito/client-id-android "${android_client_id}"
          put_string /contricool/prod/ddb/users-table-name "${users_table_name}"
          put_string /contricool/prod/ddb/transactions-table-name "${transactions_table_name}"

  smoke-prod:
    name: smoke-prod
    runs-on: ubuntu-latest
    needs: deploy-prod
    environment: prod
    steps:
      - name: Curl /v1/health (retry 10x)
        env:
          CF_DOMAIN: ${{ needs.deploy-prod.outputs.cf_domain }}
          EXPECTED_ENV: prod
        run: |
          set -euo pipefail
          attempt=0
          max_attempts=10
          backoff=10
          while [ "${attempt}" -lt "${max_attempts}" ]; do
            http_code="$(curl -fsS -o /tmp/body.json -w '%{http_code}' \
              "https://${CF_DOMAIN}/v1/health" || echo "000")"
            if [ "${http_code}" = "200" ] && \
               jq -e --arg env "${EXPECTED_ENV}" \
                 '.status == "ok" and .env == $env and (.version | length > 0)' \
                 /tmp/body.json >/dev/null 2>&1; then
              echo "Smoke passed on attempt $((attempt + 1))"
              cat /tmp/body.json
              exit 0
            fi
            echo "Attempt $((attempt + 1))/${max_attempts}: status=${http_code}"
            cat /tmp/body.json 2>/dev/null || echo "<empty body>"
            attempt=$((attempt + 1))
            sleep "${backoff}"
          done
          echo "::error::Smoke failed after ${max_attempts} attempts"
          exit 1
      - name: Curl SPA shell at / (Phase 2e — proves bundle deployed)
        env:
          CF_DOMAIN: ${{ needs.deploy-prod.outputs.cf_domain }}
        run: |
          set -euo pipefail
          attempt=0
          max_attempts=6
          backoff=10
          while [ "${attempt}" -lt "${max_attempts}" ]; do
            body="$(curl -fsS "https://${CF_DOMAIN}/" || echo '')"
            if echo "${body}" | grep -q '<script'; then
              echo "SPA shell served from /"
              exit 0
            fi
            echo "Attempt $((attempt + 1))/${max_attempts}: no <script> tag yet"
            attempt=$((attempt + 1))
            sleep "${backoff}"
          done
          echo "::error::SPA shell missing — Phase-1 placeholder still served?"
          exit 1

  tag-release:
    name: tag-release
    runs-on: ubuntu-latest
    needs: smoke-prod
    environment: prod
    permissions:
      contents: write   # push tag
    steps:
      - uses: actions/checkout@v4
      - name: Compute and push tag
        run: |
          set -euo pipefail
          sha7="$(git rev-parse --short=7 HEAD)"
          date="$(date -u +%Y-%m-%d)"
          tag="release/${date}-${sha7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Prod release ${tag}"
          git push origin "${tag}"
          echo "Tagged: ${tag}"
