name: Deploy

on:
  push:
    branches: [main]

# Two merges queue rather than overlap — CFN cannot run two parallel deploys
# against the same stack. cancel-in-progress: false on purpose.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # OIDC

jobs:
  deploy-dev:
    name: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      cf_domain: ${{ steps.outputs.outputs.cf_domain }}
      code_sha: ${{ steps.outputs.outputs.code_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The API Lambda image is arm64 but GitHub-hosted runners are x86_64.
      # qemu provides binfmt_misc emulation so ``RUN`` steps inside the
      # arm64 base image can execute. buildx is the modern docker build
      # frontend that respects ``--platform=linux/arm64``.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install infra deps
        run: pip install -e 'apps/infra[dev]'
      - name: Configure AWS credentials (Dev deploy via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: cdk deploy Contricool-Dev-*
        working-directory: apps/infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          CONTRICOOL_ALERTS_EMAIL: ${{ vars.CONTRICOOL_ALERTS_EMAIL }}
        run: |
          set -euo pipefail
          cdk deploy 'Contricool-Dev-*' \
            --require-approval never \
            --rollback true \
            --concurrency 3
      - name: Capture deploy outputs
        id: outputs
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          cf_domain="$(aws cloudformation describe-stacks \
            --stack-name Contricool-Dev-Web \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionDomainName`].OutputValue' \
            --output text)"
          code_sha="$(aws lambda get-function \
            --function-name contricool-api-dev \
            --query 'Configuration.CodeSha256' \
            --output text)"
          if [ -z "${cf_domain}" ] || [ "${cf_domain}" = "None" ]; then
            echo "::error::DistributionDomainName output missing from Contricool-Dev-Web"
            exit 1
          fi
          if [ -z "${code_sha}" ] || [ "${code_sha}" = "None" ]; then
            echo "::error::CodeSha256 missing from contricool-api-dev"
            exit 1
          fi
          echo "cf_domain=${cf_domain}" >> "${GITHUB_OUTPUT}"
          echo "code_sha=${code_sha}" >> "${GITHUB_OUTPUT}"
      - name: Write dev CloudFront domain to SSM (idempotent)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name /contricool/dev/cloudfront-domain \
            --value "${{ steps.outputs.outputs.cf_domain }}" \
            --type String \
            --overwrite

  smoke-dev:
    name: smoke-dev
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: dev
    steps:
      - name: Curl /v1/health (retry 10x)
        env:
          CF_DOMAIN: ${{ needs.deploy-dev.outputs.cf_domain }}
          EXPECTED_ENV: dev
        run: |
          set -euo pipefail
          attempt=0
          max_attempts=10
          backoff=10
          while [ "${attempt}" -lt "${max_attempts}" ]; do
            http_code="$(curl -fsS -o /tmp/body.json -w '%{http_code}' \
              "https://${CF_DOMAIN}/v1/health" || echo "000")"
            if [ "${http_code}" = "200" ] && \
               jq -e --arg env "${EXPECTED_ENV}" \
                 '.status == "ok" and .env == $env and (.version | length > 0)' \
                 /tmp/body.json >/dev/null 2>&1; then
              echo "Smoke passed on attempt $((attempt + 1))"
              cat /tmp/body.json
              exit 0
            fi
            echo "Attempt $((attempt + 1))/${max_attempts}: status=${http_code}"
            cat /tmp/body.json 2>/dev/null || echo "<empty body>"
            attempt=$((attempt + 1))
            sleep "${backoff}"
          done
          echo "::error::Smoke failed after ${max_attempts} attempts"
          exit 1

  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-latest
    needs: smoke-dev
    environment: prod   # gated on the required-reviewer rule from Phase 0
    outputs:
      cf_domain: ${{ steps.outputs.outputs.cf_domain }}
      code_sha: ${{ steps.outputs.outputs.code_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # arm64 cross-build emulation; same rationale as deploy-dev. CDK
      # asset hash is content-addressed, so prod's image is reused from
      # ECR without a second build — but buildx still needs to be
      # available on the runner for the publish-asset path.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install infra deps
        run: pip install -e 'apps/infra[dev]'
      - name: Configure AWS credentials (Prod deploy via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_PROD }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: cdk deploy Contricool-Prod-*
        working-directory: apps/infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          CONTRICOOL_ALERTS_EMAIL: ${{ vars.CONTRICOOL_ALERTS_EMAIL }}
        run: |
          set -euo pipefail
          cdk deploy 'Contricool-Prod-*' \
            --require-approval never \
            --rollback true \
            --concurrency 3
      - name: Capture deploy outputs
        id: outputs
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          cf_domain="$(aws cloudformation describe-stacks \
            --stack-name Contricool-Prod-Web \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionDomainName`].OutputValue' \
            --output text)"
          code_sha="$(aws lambda get-function \
            --function-name contricool-api-prod \
            --query 'Configuration.CodeSha256' \
            --output text)"
          # Empty/None guard before downstream comparisons. Without this
          # an aws-cli failure that emits "None" would silently slide
          # past the dev/prod CodeSha256 match check ("None" == "None").
          if [ -z "${cf_domain}" ] || [ "${cf_domain}" = "None" ]; then
            echo "::error::DistributionDomainName output missing from Contricool-Prod-Web"
            exit 1
          fi
          if [ -z "${code_sha}" ] || [ "${code_sha}" = "None" ]; then
            echo "::error::CodeSha256 missing from contricool-api-prod"
            exit 1
          fi
          echo "cf_domain=${cf_domain}" >> "${GITHUB_OUTPUT}"
          echo "code_sha=${code_sha}" >> "${GITHUB_OUTPUT}"
      - name: Verify prod image == dev image (CodeSha256)
        env:
          DEV_SHA: ${{ needs.deploy-dev.outputs.code_sha }}
          PROD_SHA: ${{ steps.outputs.outputs.code_sha }}
        run: |
          set -euo pipefail
          if [ "${DEV_SHA}" != "${PROD_SHA}" ]; then
            echo "::error::Prod image (${PROD_SHA}) does not match dev image (${DEV_SHA})."
            echo "::error::CDK should have reused the dev-built image; investigate the asset hash."
            exit 1
          fi
          echo "Image SHA matches dev: ${PROD_SHA}"
      - name: Write prod CloudFront domain to SSM (idempotent)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name /contricool/prod/cloudfront-domain \
            --value "${{ steps.outputs.outputs.cf_domain }}" \
            --type String \
            --overwrite

  smoke-prod:
    name: smoke-prod
    runs-on: ubuntu-latest
    needs: deploy-prod
    environment: prod
    steps:
      - name: Curl /v1/health (retry 10x)
        env:
          CF_DOMAIN: ${{ needs.deploy-prod.outputs.cf_domain }}
          EXPECTED_ENV: prod
        run: |
          set -euo pipefail
          attempt=0
          max_attempts=10
          backoff=10
          while [ "${attempt}" -lt "${max_attempts}" ]; do
            http_code="$(curl -fsS -o /tmp/body.json -w '%{http_code}' \
              "https://${CF_DOMAIN}/v1/health" || echo "000")"
            if [ "${http_code}" = "200" ] && \
               jq -e --arg env "${EXPECTED_ENV}" \
                 '.status == "ok" and .env == $env and (.version | length > 0)' \
                 /tmp/body.json >/dev/null 2>&1; then
              echo "Smoke passed on attempt $((attempt + 1))"
              cat /tmp/body.json
              exit 0
            fi
            echo "Attempt $((attempt + 1))/${max_attempts}: status=${http_code}"
            cat /tmp/body.json 2>/dev/null || echo "<empty body>"
            attempt=$((attempt + 1))
            sleep "${backoff}"
          done
          echo "::error::Smoke failed after ${max_attempts} attempts"
          exit 1

  tag-release:
    name: tag-release
    runs-on: ubuntu-latest
    needs: smoke-prod
    environment: prod
    permissions:
      contents: write   # push tag
    steps:
      - uses: actions/checkout@v4
      - name: Compute and push tag
        run: |
          set -euo pipefail
          sha7="$(git rev-parse --short=7 HEAD)"
          date="$(date -u +%Y-%m-%d)"
          tag="release/${date}-${sha7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Prod release ${tag}"
          git push origin "${tag}"
          echo "Tagged: ${tag}"
