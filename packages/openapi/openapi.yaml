components:
  schemas:
    AddFriendRequest:
      additionalProperties: false
      description: 'Payload for ``POST /v1/friends/add``.


        ``email`` is permissive ``str`` here so the service layer can

        distinguish between a phone-shaped identifier (â†’ 400

        ``INVALID_IDENTIFIER`` per CLAUDE.md red-line 3) and a malformed

        email (â†’ 422 ``VALIDATION_ERROR``). Strict ``EmailStr`` would

        collapse both into 422, losing the distinction.


        Phone is unverified-metadata-only on Cognito and is never used

        for lookup (CONSTRAINTS.md "email-only at MVP").'
      properties:
        email:
          maxLength: 320
          minLength: 1
          title: Email
          type: string
      required:
      - email
      title: AddFriendRequest
      type: object
    AddFriendResponse:
      description: '``POST /v1/friends/add`` 200 response â€” same shape as a list row.'
      properties:
        balance:
          anyOf:
          - $ref: '#/components/schemas/FriendBalanceSummary'
          - type: 'null'
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        name:
          title: Name
          type: string
        since:
          format: date-time
          title: Since
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - name
      - currency
      - since
      title: AddFriendResponse
      type: object
    Comment:
      description: One COMMENT row, rendered for the wire.
      properties:
        author_id:
          title: Author Id
          type: string
        body:
          title: Body
          type: string
        comment_id:
          title: Comment Id
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
        kind:
          enum:
          - user
          - system
          title: Kind
          type: string
        txn_id:
          title: Txn Id
          type: string
      required:
      - comment_id
      - txn_id
      - author_id
      - body
      - kind
      - created_at
      title: Comment
      type: object
    CreateCommentRequest:
      additionalProperties: false
      description: '``POST /v1/transactions/{txn_id}/comments`` request body.'
      properties:
        body:
          maxLength: 1000
          minLength: 1
          title: Body
          type: string
      required:
      - body
      title: CreateCommentRequest
      type: object
    CreateTransactionRequest:
      additionalProperties: false
      description: '``POST /v1/transactions`` request body.


        Structural validation only here â€” per-method invariants are in

        :func:`app.features.transactions.service.validate_create_payload`.'
      properties:
        amount:
          anyOf:
          - exclusiveMinimum: 0.0
            type: number
          - type: string
          title: Amount
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        members:
          items:
            $ref: '#/components/schemas/MemberInput'
          maxItems: 10
          minItems: 2
          title: Members
          type: array
        name:
          maxLength: 120
          minLength: 1
          title: Name
          type: string
        note:
          default: ''
          maxLength: 500
          title: Note
          type: string
        payers:
          items:
            $ref: '#/components/schemas/PayerInput'
          maxItems: 10
          minItems: 1
          title: Payers
          type: array
        split_method:
          enum:
          - equal
          - amount
          - share
          - percent
          title: Split Method
          type: string
        txn_date:
          format: date
          title: Txn Date
          type: string
        type:
          enum:
          - expense
          - settlement
          title: Type
          type: string
      required:
      - name
      - type
      - amount
      - currency
      - txn_date
      - split_method
      - members
      - payers
      title: CreateTransactionRequest
      type: object
    ExportResponse:
      description: '``GET /v1/me/export`` 200 response.'
      properties:
        exported_at:
          format: date-time
          title: Exported At
          type: string
        friendships:
          items:
            $ref: '#/components/schemas/FriendshipExport'
          title: Friendships
          type: array
        profile:
          $ref: '#/components/schemas/MeProfile'
        transactions:
          items:
            $ref: '#/components/schemas/TransactionExport'
          title: Transactions
          type: array
      required:
      - profile
      - friendships
      - transactions
      - exported_at
      title: ExportResponse
      type: object
    ForgotPasswordRequest:
      additionalProperties: false
      properties:
        email:
          format: email
          title: Email
          type: string
      required:
      - email
      title: ForgotPasswordRequest
      type: object
    ForgotPasswordResponse:
      properties:
        status:
          const: RESET_CODE_SENT
          enum:
          - RESET_CODE_SENT
          title: Status
          type: string
      required:
      - status
      title: ForgotPasswordResponse
      type: object
    FriendBalanceResponse:
      description: '``GET /v1/friends/{user_id}/balance`` 200 response.


        Phase 3a returns the fully-typed shape with zeros / ``null`` so

        Phase 3b''s UI can render the eventual balance card without

        re-architecting when Phase 4 wires real transaction aggregates.'
      properties:
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        last_transaction_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Transaction At
        net:
          title: Net
          type: string
        settlement_status:
          enum:
          - settled
          - friend_owes
          - you_owe
          title: Settlement Status
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - currency
      - net
      - settlement_status
      title: FriendBalanceResponse
      type: object
    FriendBalanceSummary:
      description: Compact pair-balance shape carried on each ``FriendItem``.
      properties:
        net:
          title: Net
          type: string
        settlement_status:
          enum:
          - settled
          - friend_owes
          - you_owe
          title: Settlement Status
          type: string
      required:
      - net
      - settlement_status
      title: FriendBalanceSummary
      type: object
    FriendItem:
      description: 'One row in the friends list â€” the friend''s identity-safe shape.


        ``balance`` is the requester-perspective net balance with the

        friend (sign convention matches :class:`FriendBalanceResponse`).

        Optional only because :class:`AddFriendResponse` reuses this shape

        on add â€” the add response doesn''t compute a balance because it''s

        always zero on a freshly-created friendship.'
      properties:
        balance:
          anyOf:
          - $ref: '#/components/schemas/FriendBalanceSummary'
          - type: 'null'
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        name:
          title: Name
          type: string
        since:
          format: date-time
          title: Since
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - name
      - currency
      - since
      title: FriendItem
      type: object
    FriendshipExport:
      description: One friendship in the export.
      properties:
        friend_user_id:
          title: Friend User Id
          type: string
        since:
          format: date-time
          title: Since
          type: string
      required:
      - friend_user_id
      - since
      title: FriendshipExport
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      properties:
        env:
          title: Env
          type: string
        status:
          title: Status
          type: string
        version:
          title: Version
          type: string
      required:
      - status
      - env
      - version
      title: HealthResponse
      type: object
    ListCommentsResponse:
      description: '``GET /v1/transactions/{txn_id}/comments`` 200 body.'
      properties:
        items:
          items:
            $ref: '#/components/schemas/Comment'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - items
      title: ListCommentsResponse
      type: object
    ListFriendsResponse:
      description: '``GET /v1/friends`` 200 response.


        ``next_cursor`` is opaque (HMAC-signed, requester-bound). When

        ``null`` the caller has reached the end of their friend list.'
      properties:
        items:
          items:
            $ref: '#/components/schemas/FriendItem'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - items
      title: ListFriendsResponse
      type: object
    ListTransactionsResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/TransactionListItem'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - items
      title: ListTransactionsResponse
      type: object
    LoginRequest:
      additionalProperties: false
      properties:
        email:
          format: email
          title: Email
          type: string
        password:
          maxLength: 256
          minLength: 1
          title: Password
          type: string
      required:
      - email
      - password
      title: LoginRequest
      type: object
    LoginResponse:
      properties:
        access_token:
          title: Access Token
          type: string
        expires_in:
          title: Expires In
          type: integer
        id_token:
          title: Id Token
          type: string
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Token
        user:
          $ref: '#/components/schemas/LoginUser'
      required:
      - access_token
      - id_token
      - expires_in
      - user
      title: LoginResponse
      type: object
    LoginUser:
      properties:
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        name:
          title: Name
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - name
      - currency
      title: LoginUser
      type: object
    MeProfile:
      description: 'Trimmed user profile on the export. Only the fields we own

        server-side; raw email + phone come from Cognito and are not

        re-exposed here.'
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        name:
          title: Name
          type: string
        status:
          title: Status
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - name
      - currency
      - status
      - created_at
      title: MeProfile
      type: object
    MeProfileSlim:
      description: '``PATCH /v1/me/profile`` 200 response.'
      properties:
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        name:
          title: Name
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - name
      - currency
      title: MeProfileSlim
      type: object
    Member:
      description: One member, with the server-computed ``owed_amount``.
      properties:
        owed_amount:
          title: Owed Amount
          type: string
        percent:
          anyOf:
          - type: string
          - type: 'null'
          title: Percent
        share:
          anyOf:
          - type: string
          - type: 'null'
          title: Share
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - owed_amount
      title: Member
      type: object
    MemberInput:
      additionalProperties: false
      description: One member entry on a create request.
      properties:
        owed_amount:
          anyOf:
          - minimum: 0.0
            type: number
          - type: string
          - type: 'null'
          title: Owed Amount
        percent:
          anyOf:
          - maximum: 100.0
            minimum: 0.0
            type: number
          - type: string
          - type: 'null'
          title: Percent
        share:
          anyOf:
          - exclusiveMinimum: 0.0
            type: number
          - type: string
          - type: 'null'
          title: Share
        user_id:
          maxLength: 26
          minLength: 26
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          title: User Id
          type: string
      required:
      - user_id
      title: MemberInput
      type: object
    Payer:
      properties:
        paid_amount:
          title: Paid Amount
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - paid_amount
      title: Payer
      type: object
    PayerInput:
      additionalProperties: false
      description: One payer entry on a create request.
      properties:
        paid_amount:
          anyOf:
          - exclusiveMinimum: 0.0
            type: number
          - type: string
          title: Paid Amount
        user_id:
          maxLength: 26
          minLength: 26
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          title: User Id
          type: string
      required:
      - user_id
      - paid_amount
      title: PayerInput
      type: object
    RefreshRequest:
      additionalProperties: false
      properties:
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Token
      title: RefreshRequest
      type: object
    RefreshResponse:
      properties:
        access_token:
          title: Access Token
          type: string
        expires_in:
          title: Expires In
          type: integer
        id_token:
          title: Id Token
          type: string
      required:
      - access_token
      - id_token
      - expires_in
      title: RefreshResponse
      type: object
    ResendEmailCodeRequest:
      additionalProperties: false
      properties:
        email:
          format: email
          title: Email
          type: string
      required:
      - email
      title: ResendEmailCodeRequest
      type: object
    ResendEmailCodeResponse:
      properties:
        status:
          const: RESENT
          enum:
          - RESENT
          title: Status
          type: string
      required:
      - status
      title: ResendEmailCodeResponse
      type: object
    ResetPasswordRequest:
      additionalProperties: false
      properties:
        code:
          maxLength: 10
          minLength: 4
          title: Code
          type: string
        email:
          format: email
          title: Email
          type: string
        new_password:
          maxLength: 256
          minLength: 10
          title: New Password
          type: string
      required:
      - email
      - code
      - new_password
      title: ResetPasswordRequest
      type: object
    ResetPasswordResponse:
      properties:
        password_reset:
          title: Password Reset
          type: boolean
      required:
      - password_reset
      title: ResetPasswordResponse
      type: object
    SignupRequest:
      additionalProperties: false
      properties:
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        email:
          format: email
          title: Email
          type: string
        name:
          maxLength: 128
          minLength: 1
          title: Name
          type: string
        password:
          maxLength: 256
          minLength: 10
          title: Password
          type: string
        phone:
          anyOf:
          - pattern: ^\+[1-9]\d{1,14}$
            type: string
          - type: 'null'
          title: Phone
      required:
      - email
      - password
      - name
      - currency
      title: SignupRequest
      type: object
    SignupResponse:
      properties:
        status:
          const: PENDING_VERIFICATION
          enum:
          - PENDING_VERIFICATION
          title: Status
          type: string
        user_id:
          maxLength: 26
          minLength: 26
          title: User Id
          type: string
      required:
      - user_id
      - status
      title: SignupResponse
      type: object
    TelemetryAck:
      description: Trivial 202 acknowledgement so the client knows the event landed.
      properties:
        accepted:
          default: true
          title: Accepted
          type: boolean
      title: TelemetryAck
      type: object
    TelemetryEvent:
      additionalProperties: false
      description: 'One frontend telemetry event.


        ``level=error`` is for uncaught errors / unhandled promise

        rejections.  ``level=metric`` is for Core Web Vitals (LCP, INP,

        CLS, FID, TTFB) plus other custom dimensions.'
      properties:
        extra:
          additionalProperties:
            anyOf:
            - type: string
            - type: integer
            - type: number
            - type: boolean
            - type: 'null'
          title: Extra
          type: object
        level:
          enum:
          - error
          - metric
          title: Level
          type: string
        message:
          default: ''
          maxLength: 2000
          title: Message
          type: string
        name:
          maxLength: 128
          minLength: 1
          title: Name
          type: string
        stack:
          default: ''
          maxLength: 8000
          title: Stack
          type: string
        url:
          default: ''
          maxLength: 2000
          title: Url
          type: string
        user_agent:
          default: ''
          maxLength: 512
          title: User Agent
          type: string
        value:
          anyOf:
          - type: number
          - type: 'null'
          title: Value
      required:
      - level
      - name
      title: TelemetryEvent
      type: object
    Transaction:
      description: '``POST /v1/transactions`` 201 + ``GET /v1/transactions/{id}``
        200.'
      properties:
        amount:
          title: Amount
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
        creator_id:
          title: Creator Id
          type: string
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        deleted_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Deleted At
        members:
          items:
            $ref: '#/components/schemas/Member'
          title: Members
          type: array
        name:
          title: Name
          type: string
        note:
          title: Note
          type: string
        payers:
          items:
            $ref: '#/components/schemas/Payer'
          title: Payers
          type: array
        split_method:
          enum:
          - equal
          - amount
          - share
          - percent
          title: Split Method
          type: string
        txn_date:
          format: date
          title: Txn Date
          type: string
        txn_id:
          title: Txn Id
          type: string
        type:
          enum:
          - expense
          - settlement
          title: Type
          type: string
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - txn_id
      - creator_id
      - name
      - type
      - amount
      - currency
      - txn_date
      - note
      - split_method
      - members
      - payers
      - created_at
      - updated_at
      title: Transaction
      type: object
    TransactionExport:
      description: One transaction (META + members + payers) in the export.
      properties:
        amount:
          title: Amount
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
        creator_id:
          title: Creator Id
          type: string
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        deleted_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Deleted At
        members:
          items:
            $ref: '#/components/schemas/Member'
          title: Members
          type: array
        name:
          title: Name
          type: string
        note:
          title: Note
          type: string
        payers:
          items:
            $ref: '#/components/schemas/Payer'
          title: Payers
          type: array
        split_method:
          enum:
          - equal
          - amount
          - share
          - percent
          title: Split Method
          type: string
        txn_date:
          format: date
          title: Txn Date
          type: string
        txn_id:
          title: Txn Id
          type: string
        type:
          enum:
          - expense
          - settlement
          title: Type
          type: string
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - txn_id
      - creator_id
      - name
      - type
      - amount
      - currency
      - txn_date
      - note
      - split_method
      - members
      - payers
      - created_at
      - updated_at
      title: TransactionExport
      type: object
    TransactionListItem:
      description: 'One row in ``GET /v1/transactions`` â€” META + the requester''s

        owed/paid amounts.


        Both ``my_owed_amount`` and ``my_paid_amount`` are surfaced so the

        dashboard summary can compute ``net = paid - owed`` per transaction

        without an extra round-trip to read META payers. ``my_paid_amount``

        is the requester''s slot in ``meta.payers`` (0.00 if they didn''t pay).'
      properties:
        amount:
          title: Amount
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
        creator_id:
          title: Creator Id
          type: string
        currency:
          enum:
          - USD
          - INR
          title: Currency
          type: string
        my_owed_amount:
          title: My Owed Amount
          type: string
        my_paid_amount:
          title: My Paid Amount
          type: string
        name:
          title: Name
          type: string
        split_method:
          enum:
          - equal
          - amount
          - share
          - percent
          title: Split Method
          type: string
        txn_date:
          format: date
          title: Txn Date
          type: string
        txn_id:
          title: Txn Id
          type: string
        type:
          enum:
          - expense
          - settlement
          title: Type
          type: string
      required:
      - txn_id
      - name
      - type
      - amount
      - currency
      - txn_date
      - split_method
      - creator_id
      - my_owed_amount
      - my_paid_amount
      - created_at
      title: TransactionListItem
      type: object
    UpdateProfileRequest:
      additionalProperties: false
      description: '``PATCH /v1/me/profile`` request body.


        Only the display ``name`` is mutable. Email and ``currency`` are

        intentionally absent and any extra field is rejected so that

        accidental client churn cannot rewrite them.'
      properties:
        name:
          maxLength: 128
          minLength: 1
          title: Name
          type: string
      required:
      - name
      title: UpdateProfileRequest
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    VerifyEmailRequest:
      additionalProperties: false
      properties:
        code:
          maxLength: 10
          minLength: 4
          title: Code
          type: string
        email:
          format: email
          title: Email
          type: string
      required:
      - email
      - code
      title: VerifyEmailRequest
      type: object
    VerifyEmailResponse:
      properties:
        account_active:
          title: Account Active
          type: boolean
        email_verified:
          title: Email Verified
          type: boolean
      required:
      - email_verified
      - account_active
      title: VerifyEmailResponse
      type: object
info:
  description: ContriCool API â€” Phase 2c email-only auth backend (/v1/auth/*). Generated
    from FastAPI; do not hand-edit.
  title: ContriCool API
  version: 0.0.1
openapi: 3.1.0
paths:
  /auth/forgot-password:
    post:
      operationId: forgot_password_v1_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Forgot Password
      tags:
      - auth
